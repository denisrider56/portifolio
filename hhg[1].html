<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Denis | Elite Portfolio</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}

body {
    background: linear-gradient(135deg, #0f172a, #020617);
    color: white;
}

/* NAV */
nav {
    display: flex;
    justify-content: space-between;
    padding: 20px 50px;
    position: sticky;
    top: 0;
    backdrop-filter: blur(10px);
}

nav a {
    margin-left: 20px;
    text-decoration: none;
    color: white;
}

/* HERO */
.hero {
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: space-around;
    flex-wrap: wrap;
}

.hero img {
    width: 220px;
    border-radius: 50%;
    box-shadow: 0 0 40px #38bdf8;
}

/* GLASS CARD */
.glass {
    background: rgba(255,255,255,0.05);
    border-radius: 15px;
    padding: 30px;
    backdrop-filter: blur(15px);
    box-shadow: 0 0 30px rgba(0,0,0,0.5);
}

/* BUTTON */
.btn {
    margin-top: 15px;
    padding: 10px 20px;
    border: none;
    background: linear-gradient(45deg,#38bdf8,#0ea5e9);
    color: black;
    border-radius: 5px;
    cursor: pointer;
}

/* SECTIONS */
section {
    padding: 60px 50px;
}

/* PROJECTS */
.projects {
    display: grid;
    grid-template-columns: repeat(auto-fit,minmax(250px,1fr));
    gap: 20px;
}

.card {
    transition: 0.4s;
}

.card:hover {
    transform: translateY(-10px) scale(1.03);
}

/* SKILLS */
.bar {
    background: #1e293b;
    border-radius: 5px;
    overflow: hidden;
}

.bar div {
    height: 10px;
    background: linear-gradient(to right,#38bdf8,#0ea5e9);
}

/* CONTACT */
input, textarea {
    width: 100%;
    margin: 10px 0;
    padding: 10px;
    border: none;
    border-radius: 5px;
}

/* FOOTER */
footer {
    text-align: center;
    padding: 20px;
    opacity: 0.7;
}
</style>
</head>

<body>

<nav>
    <h2>Denis</h2>
    <div>
        <a href="#about">About</a>
        <a href="#projects">Projects</a>
        <a href="#contact">Contact</a>
    </div>
</nav>

<!-- HERO -->
<div class="hero">
    <img src="https://via.placeholder.com/200">
    
    <div class="glass">
        <h1>Hi, I'm Denis 👋</h1>
        <p id="typing"></p>
        <button class="btn">Hire Me</button>
    </div>
</div>

<!-- ABOUT -->
<section id="about">
    <div class="glass">
        <h2>About Me</h2>
        <p>I build modern systems using C++, Python and Web Technologies.</p>
    </div>
</section>

<!-- SKILLS -->
<section>
    <div class="glass">
        <h2>Skills</h2>
        <p>C++</p>
        <div class="bar"><div style="width:80%"></div></div>

        <p>Python</p>
        <div class="bar"><div style="width:75%"></div></div>

        <p>Web Dev</p>
        <div class="bar"><div style="width:85%"></div></div>
    </div>
</section>

<!-- PROJECTS -->
<section id="projects">
    <h2>Projects</h2>

    <div class="projects">
        <div class="glass card">
            <h3>Calculator</h3>
            <p>C++ Project</p>
            <button class="btn">GitHub</button>
            <button class="btn">Live Demo</button>
        </div>

        <div class="glass card">
            <h3>Login System</h3>
            <p>Authentication system</p>
            <button class="btn">GitHub</button>
            <button class="btn">Live Demo</button>
        </div>
    </div>
</section>

<!-- CONTACT -->
<section id="contact">
    <div class="glass">
        <h2>Contact Me</h2>
        <input type="text" placeholder="Your Name">
        <input type="email" placeholder="Your Email">
        <textarea placeholder="Message"></textarea>
        <button class="btn">Send Message</button>
    </div>
</section>

<footer>
    <p>© 2026 Denis | Elite Portfolio</p>
</footer>

<script>
// Typing Effect
const texts = ["IT Student 💻","Web Developer 🌐","Python Programmer 🐍"];
let i=0,j=0,current="",isDeleting=false;

function type(){
    current=texts[i];
    document.getElementById("typing").textContent=current.substring(0,j);

    if(!isDeleting) j++; else j--;

    if(j==current.length) isDeleting=true;
    if(j==0){ isDeleting=false; i=(i+1)%texts.length;}

    setTimeout(type,isDeleting?50:100);
}
type();
</script>

</body>
</html>
